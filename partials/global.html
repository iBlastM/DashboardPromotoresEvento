<!-- partials/global.html -->
<div class="section">
  <h2 class="section-title">Vista Global — Todos los Líderes</h2>

  <!-- Fila 1: Donut asistencia + Donut estado + Llegadas por hora (1:1:2) -->
  <div class="charts-grid charts-grid--triple">
    <div class="chart-card chart-card--teal">
      <div id="global-asistencia-pie" class="chart-container chart-sm"></div>
    </div>
    <div class="chart-card chart-card--gold">
      <div id="global-estado-lideres" class="chart-container chart-sm"></div>
    </div>
    <div class="chart-card chart-card--blue">
      <div id="global-llegadas-hora" class="chart-container chart-sm"></div>
    </div>
  </div>

  <!-- Fila 2: Rankings -->
  <div class="charts-grid cols-2">
    <div class="chart-card chart-card--emrld">
      <div id="global-top-asistentes" class="chart-container chart-tall"></div>
    </div>
    <div class="chart-card chart-card--lime">
      <div id="global-top-efectividad" class="chart-container chart-tall"></div>
    </div>
  </div>
</div>
